<!DOCTYPE html>
<html lang="es">
  <!-- hola mundo -->
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <link rel="stylesheet" href="./style/style.css">
  <title>Feliz cumpleaños 🤗</title>
  <link rel="icon" href="./img/kue_3.png">
</head>
<body>
  <div id="kotak-pesan">
    <div class="pesan">
      <div class="welcome-text">
        <h1>🎉 ¡Feliz Cumpleaños! 🎂</h1>
        <p id="nama">Estás invitado a una celebración especial</p>
        <p id="nombre-festivo">✨ Una fiesta mágica te espera ✨</p>
      </div>
      <button onclick="exit()" class="start-btn">
        <span class="btn-icon">🎈</span>
        <span class="btn-text">COMENZAR CELEBRACIÓN</span>
      </button>
    </div>
  </div>
  <audio src="./sound/golden.mp3"  id="musik"></audio>
  
  <div class="bg">
    <div class="content" id="content">
      <div class="atas" id="atas">
        <img src="./img/pastel.gif" alt="" id="gambar"> 
      </div>
      <div class="bawah" id="bawah">
        <p id="ucapan"></p>
        <button id="btn" onclick="gantiGambar(this)">🎉 ¡Comenzar la magia! 🎊</button>

        <button id="btn_2" onclick="ucapanCetak()">➡️ Siguiente</button>
        <button id="btn_3" onclick="hapusKue()">🎈 Continuar</button>
        <button id="link" onclick="explosionCelebracion()">🎂 ¡FELIZ CUMPLEAÑOS<br>ALISON! 🎊🎈🎇</button>
        <div id="mensajeFinal" class="mensaje-final">¡No faltes! 🎉</div>
      </div>
    </div>
  </div>
  
  <script src="./script/script.js"></script>
</body>
</html>
